<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTrack - Lupa Password</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-page="auth">

    <div class="page-section">
        <div class="auth-page">
            <div class="auth-container">
                <div class="auth-left">
                    <div class="auth-left-content">
                        <div class="auth-logo"><i class="fas fa-landmark"></i></div>
                        <h1>Reset Password</h1>
                        <p>Masukkan email akun kamu. Kami akan kirim link untuk membuat password baru.</p>

                        <div class="auth-features">
                            <div class="auth-feature">
                                <i class="fas fa-shield-alt"></i>
                                <span>Aman dan cepat</span>
                            </div>
                            <div class="auth-feature">
                                <i class="fas fa-envelope"></i>
                                <span>Link reset via email</span>
                            </div>
                            <div class="auth-feature">
                                <i class="fas fa-lock"></i>
                                <span>Buat password baru</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="auth-right">
                    <div class="auth-header">
                        <h2>Lupa Password</h2>
                        <p>Kami akan kirim link reset ke email kamu</p>
                    </div>

                    <form id="forgotPasswordForm">
                        <div class="form-group">
                            <label>Email</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input type="email" placeholder="nama@email.com" autocomplete="email" required>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary">
                            <i class="fas fa-paper-plane"></i> Kirim Link Reset
                        </button>

                        <div class="divider"><span>atau</span></div>

                        <a class="btn-secondary" href="login.html" style="display: inline-block; text-align: center; text-decoration: none;">
                            <i class="fas fa-arrow-left"></i> Kembali ke Login
                        </a>
                    </form>

                    <div class="auth-footer">
                        Belum punya akun? <a href="register.html">Daftar di sini</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
