<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTrack - Ruang Chat</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="mainApp" class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-landmark"></i></div>
                    <span>TimeTrack</span>
                </div>
            </div>

            <nav class="nav-menu">
                <div class="nav-section">
                    <div class="nav-section-title">Menu Utama</div>
                    <a href="index.html" class="nav-item">
                        <i class="fas fa-home"></i>
                        <span>Beranda</span>
                    </a>
                    <a href="materi.html" class="nav-item">
                        <i class="fas fa-book"></i>
                        <span>Materi Pembelajaran</span>
                    </a>
                    <a href="quizzes.html" class="nav-item">
                        <i class="fas fa-circle-question"></i>
                        <span>Kuis</span>
                    </a>
                    <a href="community.html" class="nav-item active">
                        <i class="fas fa-comments"></i>
                        <span>Komunitas</span>
                    </a>
                    <a href="tasks.html" class="nav-item">
                        <i class="fas fa-list-check"></i>
                        <span>Tugas</span>
                    </a>
                    <a href="premium.html" class="nav-item">
                        <i class="fas fa-crown"></i>
                        <span>Premium</span>
                    </a>
                    <a href="shop.html" class="nav-item">
                        <i class="fas fa-store"></i>
                        <span>Toko</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Eksplorasi</div>
                    <a href="timeline.html" class="nav-item">
                        <i class="fas fa-stream"></i>
                        <span>Timeline Sejarah</span>
                    </a>
                    <a href="tokoh.html" class="nav-item">
                        <i class="fas fa-users"></i>
                        <span>Tokoh &amp; Kisah</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Lainnya</div>
                    <a href="notification.html" class="nav-item">
                        <i class="fas fa-bell"></i>
                        <span>Notifikasi</span>
                    </a>
                    <a href="saved.html" class="nav-item">
                        <i class="fas fa-bookmark"></i>
                        <span>Tersimpan</span>
                    </a>
                    <a href="achievement.html" class="nav-item">
                        <i class="fas fa-trophy"></i>
                        <span>Pencapaian</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <a class="user-profile" href="profile.html" style="text-decoration: none; color: inherit;">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100" alt="User" class="user-avatar">
                    <div class="user-info">
                        <div class="user-name">...</div>
                        <div class="user-role">Pelajar Aktif</div>
                    </div>
                    <i class="fas fa-chevron-right" style="color: var(--text-light); font-size: 12px;"></i>
                </a>
            </div>
        </aside>

        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <main class="main-content">
            <header class="top-header">
                <div style="display: flex; align-items: center; flex: 1;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()" type="button">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Cari pesan...">
                    </div>
                </div>

                <div class="header-actions">
                    <button class="icon-btn" onclick="window.location.href='notification.html'" type="button">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                    </button>
                    <button class="icon-btn" onclick="window.location.href='profile.html'" type="button">
                        <i class="fas fa-user"></i>
                    </button>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="section-header">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <button onclick="window.history.back()" style="background: none; border: none; font-size: 18px; color: var(--text); cursor: pointer;">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <h2 class="section-title" id="roomTitle">Ruang Chat</h2>
                    </div>
                    <div class="section-action">
                        <span id="onlineStatus" style="font-size: 13px; color: var(--green); display: flex; align-items: center; gap: 6px;">
                            <span style="width: 8px; height: 8px; background: var(--green); border-radius: 50%;"></span> Online
                        </span>
                    </div>
                </div>

                <div style="display: flex; flex-direction: column; height: calc(100vh - 180px); background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
                    <!-- Chat Area -->
                    <div id="chatMessages" style="flex: 1; padding: 20px; overflow-y: auto; background: #f8f9fa; display: flex; flex-direction: column; gap: 12px;">
                        <div style="text-align: center; color: var(--text-light); font-size: 13px; margin: 20px 0;">
                            Memuat percakapan...
                        </div>
                    </div>

                    <!-- Input Area -->
                    <form id="chatForm" style="padding: 16px; background: white; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="chatInput" placeholder="Ketik pesan..." style="flex: 1; padding: 12px 16px; border-radius: 24px; border: 1px solid var(--border); outline: none; transition: border-color 0.2s;" autocomplete="off">
                        <button type="submit" style="width: 44px; height: 44px; border-radius: 50%; background: var(--primary); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s;">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabaseClient.js"></script>
    <script src="assets/js/bootstrap.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/dataPages.js"></script>
</body>
</html>
