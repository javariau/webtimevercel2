<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTrack - Buat Password Baru</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-page="auth">

    <div class="page-section">
        <div class="auth-page">
            <div class="auth-container">
                <div class="auth-left">
                    <div class="auth-left-content">
                        <div class="auth-logo"><i class="fas fa-landmark"></i></div>
                        <h1>Buat Password Baru</h1>
                        <p>Pastikan password baru kamu mudah diingat dan aman.</p>

                        <div class="auth-features">
                            <div class="auth-feature">
                                <i class="fas fa-key"></i>
                                <span>Password minimal 8 karakter</span>
                            </div>
                            <div class="auth-feature">
                                <i class="fas fa-user-check"></i>
                                <span>Update akun otomatis</span>
                            </div>
                            <div class="auth-feature">
                                <i class="fas fa-sign-in-alt"></i>
                                <span>Login lagi setelah reset</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="auth-right">
                    <div class="auth-header">
                        <h2>Password Baru</h2>
                        <p>Masukkan password baru kamu</p>
                    </div>

                    <form id="resetPasswordForm">
                        <div class="form-group">
                            <label>Password Baru</label>
                            <div class="input-wrapper has-action">
                                <i class="fas fa-lock"></i>
                                <input id="resetPasswordInput" class="form-input" type="password" placeholder="Minimal 8 karakter" autocomplete="new-password" required>
                                <button id="toggleResetPasswordBtn" type="button" class="input-action-btn" aria-label="Tampilkan password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Konfirmasi Password</label>
                            <div class="input-wrapper has-action">
                                <i class="fas fa-lock"></i>
                                <input id="resetPasswordConfirmInput" class="form-input" type="password" placeholder="Konfirmasi password" autocomplete="new-password" required>
                                <button id="toggleResetPasswordConfirmBtn" type="button" class="input-action-btn" aria-label="Tampilkan password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save"></i> Simpan Password Baru
                        </button>

                        <div class="divider"><span>atau</span></div>

                        <a class="btn-secondary" href="login.html" style="display: inline-block; text-align: center; text-decoration: none;">
                            <i class="fas fa-arrow-left"></i> Kembali ke Login
                        </a>
                    </form>

                    <div class="auth-footer">
                        Jika link reset tidak valid, minta link baru dari <a href="forgot-password.html">Lupa Password</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
