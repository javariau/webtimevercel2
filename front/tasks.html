<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas & Latihan - TimeTrack</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="mainApp" class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-landmark"></i></div>
                    <span>TimeTrack</span>
                </div>
            </div>
            
            <nav class="nav-menu">
                <div class="nav-section">
                    <div class="nav-section-title">Menu Utama</div>
                    <a href="index.html" class="nav-item">
                        <i class="fas fa-home"></i>
                        <span>Beranda</span>
                    </a>
                    <a href="materi.html" class="nav-item">
                        <i class="fas fa-book"></i>
                        <span>Materi Pembelajaran</span>
                    </a>
                    <a href="quizzes.html" class="nav-item">
                        <i class="fas fa-circle-question"></i>
                        <span>Kuis</span>
                    </a>
                    <a href="community.html" class="nav-item">
                        <i class="fas fa-comments"></i>
                        <span>Komunitas</span>
                    </a>
                    <a href="tasks.html" class="nav-item active">
                        <i class="fas fa-list-check"></i>
                        <span>Tugas</span>
                    </a>
                    <a href="premium.html" class="nav-item">
                        <i class="fas fa-crown"></i>
                        <span>Premium</span>
                    </a>
                    <a href="shop.html" class="nav-item">
                        <i class="fas fa-store"></i>
                        <span>Toko</span>
                    </a>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">Eksplorasi</div>
                    <a href="timeline.html" class="nav-item">
                        <i class="fas fa-stream"></i>
                        <span>Timeline Sejarah</span>
                    </a>
                    <a href="tokoh.html" class="nav-item">
                        <i class="fas fa-users"></i>
                        <span>Tokoh &amp; Kisah</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">Lainnya</div>
                    <a href="notification.html" class="nav-item">
                        <i class="fas fa-bell"></i>
                        <span>Notifikasi</span>
                    </a>
                    <a href="saved.html" class="nav-item">
                        <i class="fas fa-bookmark"></i>
                        <span>Tersimpan</span>
                    </a>
                    <a href="achievement.html" class="nav-item">
                        <i class="fas fa-trophy"></i>
                        <span>Pencapaian</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <div class="profile-container" style="position:relative;">
                    <div class="profile-dropdown" id="profileDropdown">
                        <a href="profile-edit.html" class="dropdown-item"><i class="fas fa-user-pen"></i> Edit Profil</a>
                        <a href="login.html" class="dropdown-item"><i class="fas fa-right-from-bracket"></i> Ganti Akun</a>
                        <div class="dropdown-divider"></div>
                        <a href="#" onclick="handleLogout(event)" class="dropdown-item" style="color:#e53935;"><i class="fas fa-power-off"></i> Logout</a>
                    </div>
                    <div class="user-profile" onclick="toggleProfileMenu(event)">
                        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100" alt="User" class="user-avatar">
                        <div class="user-info">
                            <div class="user-name">...</div>
                            <div class="user-role">Pelajar Aktif</div>
                        </div>
                        <i class="fas fa-chevron-up" style="color: var(--text-light); font-size: 12px;"></i>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Overlay for mobile -->
        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div style="display: flex; align-items: center; flex: 1;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2 style="font-size: 18px; margin: 0; color: var(--text);">Tugas & Latihan</h2>
                </div>
                
                <div class="header-actions">
                    <!-- XP Badge -->
                    <div class="xp-badge" style="background: var(--bg-light); padding: 8px 16px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-weight: 600; color: var(--primary); margin-right: 8px;">
                        <i class="fas fa-star" style="color: #f59e0b;"></i>
                        <span id="headerUserXp">0</span> XP
                    </div>
                    <button class="icon-btn" onclick="window.location.href='notification.html'" type="button">
                        <i class="fas fa-bell"></i>
                        <span class="badge" style="display:none">0</span>
                    </button>
                    <button class="icon-btn" onclick="window.location.href='profile.html'" type="button">
                        <i class="fas fa-user"></i>
                    </button>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="section-header">
                    <h2 class="section-title">Daftar Tugas Harian</h2>
                </div>

                <!-- Container untuk Tugas Harian Dinamis -->
                <div id="dailyTasksContainer" class="tasks-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;">
                    <!-- Loading State -->
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-light);">
                        <i class="fas fa-spinner fa-spin"></i> Memuat tugas harian...
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/supabaseClient.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/bootstrap.js"></script>
    <script src="assets/js/dailyTasks.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
